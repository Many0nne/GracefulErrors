<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GracefulErrors — Vue Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-void: #0a0a0f;
        --bg-surface: #0f0f1a;
        --bg-card: #141420;
        --bg-raised: #1a1a2e;
        --border-dim: #1e1e35;
        --border-mid: #2a2a4a;
        --border-bright: #3d3d70;
        --text-muted: #4a4a7a;
        --text-dim: #7070aa;
        --text-base: #b0b0d8;
        --text-bright: #e0e0f5;
        --text-white: #f5f5ff;
        --accent-blue: #4d9fff;
        --accent-cyan: #00d4ff;
        --accent-green: #00ff88;
        --accent-yellow: #ffd700;
        --accent-orange: #ff8c42;
        --accent-red: #ff4466;
        --accent-purple: #c084fc;
        --accent-pink: #ff6eb4;
        --glow-blue: rgba(77, 159, 255, 0.15);
        --glow-red: rgba(255, 68, 102, 0.15);
        --glow-green: rgba(0, 255, 136, 0.12);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg-void);
        color: var(--text-base);
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        line-height: 1.6;
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-void); }
      ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

      /* Grid background */
      .grid-bg {
        background-image:
          linear-gradient(var(--border-dim) 1px, transparent 1px),
          linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Glowing dot background */
      .dot-bg {
        background-image: radial-gradient(circle, var(--border-mid) 1px, transparent 1px);
        background-size: 24px 24px;
      }

      /* Cards */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        border-radius: 8px;
        transition: border-color 0.2s;
      }
      .card:hover { border-color: var(--border-mid); }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 5px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.15s ease;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .btn:active { transform: translateY(1px); }

      .btn-primary {
        background: var(--accent-blue);
        color: #000;
        border-color: var(--accent-blue);
      }
      .btn-primary:hover { background: #72b8ff; box-shadow: 0 0 16px var(--glow-blue); }

      .btn-danger {
        background: transparent;
        color: var(--accent-red);
        border-color: var(--accent-red);
      }
      .btn-danger:hover { background: var(--glow-red); box-shadow: 0 0 12px var(--glow-red); }

      .btn-success {
        background: transparent;
        color: var(--accent-green);
        border-color: var(--accent-green);
      }
      .btn-success:hover { background: var(--glow-green); }

      .btn-ghost {
        background: transparent;
        color: var(--text-dim);
        border-color: var(--border-mid);
      }
      .btn-ghost:hover { color: var(--text-bright); border-color: var(--border-bright); }

      .btn-warning {
        background: transparent;
        color: var(--accent-yellow);
        border-color: var(--accent-yellow);
      }
      .btn-warning:hover { background: rgba(255, 215, 0, 0.1); }

      .btn-info {
        background: transparent;
        color: var(--accent-cyan);
        border-color: var(--accent-cyan);
      }
      .btn-info:hover { background: rgba(0, 212, 255, 0.08); }

      .btn-purple {
        background: transparent;
        color: var(--accent-purple);
        border-color: var(--accent-purple);
      }
      .btn-purple:hover { background: rgba(192, 132, 252, 0.08); }

      .btn-orange {
        background: transparent;
        color: var(--accent-orange);
        border-color: var(--accent-orange);
      }
      .btn-orange:hover { background: rgba(255, 140, 66, 0.08); }

      .btn-sm {
        padding: 4px 10px;
        font-size: 11px;
      }

      /* Section title */
      .section-title {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 18px;
        color: var(--text-white);
        letter-spacing: -0.01em;
      }

      /* Tags / badges */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .badge-blue { background: rgba(77,159,255,0.12); color: var(--accent-blue); border: 1px solid rgba(77,159,255,0.25); }
      .badge-red { background: rgba(255,68,102,0.12); color: var(--accent-red); border: 1px solid rgba(255,68,102,0.25); }
      .badge-green { background: rgba(0,255,136,0.10); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.2); }
      .badge-yellow { background: rgba(255,215,0,0.10); color: var(--accent-yellow); border: 1px solid rgba(255,215,0,0.2); }
      .badge-cyan { background: rgba(0,212,255,0.08); color: var(--accent-cyan); border: 1px solid rgba(0,212,255,0.2); }
      .badge-purple { background: rgba(192,132,252,0.10); color: var(--accent-purple); border: 1px solid rgba(192,132,252,0.2); }
      .badge-orange { background: rgba(255,140,66,0.10); color: var(--accent-orange); border: 1px solid rgba(255,140,66,0.2); }
      .badge-gray { background: rgba(112,112,170,0.12); color: var(--text-dim); border: 1px solid rgba(112,112,170,0.2); }

      /* Code / monospace blocks */
      .code-block {
        background: var(--bg-void);
        border: 1px solid var(--border-dim);
        border-radius: 4px;
        padding: 10px 12px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--text-dim);
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* Input */
      .input {
        background: var(--bg-void);
        border: 1px solid var(--border-mid);
        border-radius: 4px;
        padding: 6px 10px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--text-bright);
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }
      .input:focus { border-color: var(--accent-blue); }
      .input.error-field { border-color: var(--accent-red); }
      .input::placeholder { color: var(--text-muted); }

      /* Toast animations */
      @keyframes toast-in {
        from { opacity: 0; transform: translateX(24px) scale(0.95); }
        to { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes toast-out {
        from { opacity: 1; transform: translateX(0) scale(1); }
        to { opacity: 0; transform: translateX(24px) scale(0.95); }
      }
      @keyframes modal-in {
        from { opacity: 0; transform: scale(0.94) translateY(8px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes progress-shrink {
        from { width: 100%; }
        to { width: 0%; }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 transparent; }
        50% { box-shadow: 0 0 0 3px var(--glow-blue); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scan-line {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }

      .toast-enter { animation: toast-in 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .toast-leave { animation: toast-out 0.2s ease-in forwards; }
      .modal-enter { animation: modal-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .fade-in { animation: fadeIn 0.3s ease forwards; }

      /* Divider */
      .divider {
        height: 1px;
        background: var(--border-dim);
      }

      /* Status indicator */
      .dot-status {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }
      .dot-green { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
      .dot-red { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }
      .dot-yellow { background: var(--accent-yellow); box-shadow: 0 0 6px var(--accent-yellow); }
      .dot-blue { background: var(--accent-blue); box-shadow: 0 0 6px var(--accent-blue); }
      .dot-gray { background: var(--text-muted); }

      /* Section header accent line */
      .accent-line {
        height: 2px;
        width: 32px;
        border-radius: 1px;
      }

      /* Nav tabs */
      .nav-tab {
        padding: 8px 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        letter-spacing: 0.03em;
        white-space: nowrap;
      }
      .nav-tab:hover { color: var(--text-dim); }
      .nav-tab.active {
        color: var(--accent-blue);
        border-bottom-color: var(--accent-blue);
      }

      /* Result display */
      .result-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid var(--border-dim);
        font-size: 11px;
      }
      .result-row:last-child { border-bottom: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
